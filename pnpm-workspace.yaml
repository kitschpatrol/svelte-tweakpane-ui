packages:
  - .
  - docs
  - svelte-5

onlyBuiltDependencies:
  - esbuild
  - puppeteer
  - sharp
  - unrs-resolver
  - workerd

overrides:
  '@eslint/plugin-kit': ~0.6.0
  cookie: ~1.1.1
  esbuild: ~0.27.3
  lodash: ^4.17.23
  '@isaacs/brace-expansion': ^5.0.1

patchedDependencies:
  '@astrojs/starlight': patches/@astrojs__starlight.patch

publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - case-police
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'
